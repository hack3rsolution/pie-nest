<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="15" fill="#0a0a0a" stroke="#2a9d8f" stroke-width="1"/>
  <!-- Magpie body -->
  <ellipse cx="16" cy="15" rx="7" ry="6" fill="#1a1a1a"/>
  <!-- White belly -->
  <ellipse cx="16" cy="17" rx="4" ry="3.5" fill="#fafaf9"/>
  <!-- Head -->
  <circle cx="16" cy="10" r="4.5" fill="#1a1a1a"/>
  <!-- Beak -->
  <polygon points="20,10 23,9.5 20,9" fill="#9c9a94"/>
  <!-- Eye -->
  <circle cx="18" cy="9.5" r="1.2" fill="#2a9d8f"/>
  <circle cx="18.3" cy="9.2" r="0.4" fill="#fafaf9"/>
  <!-- Tail -->
  <polygon points="9,16 5,22 10,19" fill="#1a1a1a"/>
  <polygon points="9.5,17 6,22.5 10.5,19.5" fill="#2a9d8f" opacity="0.6"/>
  <!-- Wing detail -->
  <ellipse cx="14" cy="14" rx="4" ry="3" fill="#2a2a2a" transform="rotate(-10 14 14)"/>
</svg>